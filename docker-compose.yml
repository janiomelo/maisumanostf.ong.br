services:
  app:
    build: .
    container_name: maisuma_app
    command: flask --app wsgi:app run --host=0.0.0.0 --port=8000 --debug
    env_file:
      - .env
    volumes:
      - ./:/app
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: maisuma_nginx
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web

networks:
  web: