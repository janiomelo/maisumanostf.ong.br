{% extends "publico/base.html" %}

{% block title %}{{ pagina.titulo }} | Wiki{% endblock %}

{% block content %}
<section class="learn-more-box" id="wiki-pagina" aria-label="Página da Wiki">
  <p><a href="{{ url_for('wiki.indice_wiki') }}">Wiki</a> / {{ pagina.titulo }}</p>
  <h1>{{ pagina.titulo }}</h1>

  {{ pagina.conteudo_html | safe }}

  <p><a href="{{ url_for('wiki.editar_pagina_wiki', slug=pagina.slug) }}">Editar esta página (acesso autenticado)</a></p>
</section>
{% endblock %}
